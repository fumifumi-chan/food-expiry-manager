<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>賞味期限管理</title>

    <!-- Alpine.js -->
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    x-data="app()"
    x-init="loadData()"
    @submit-data.window="addItem($event.detail)"
  >
    <header>賞味期限管理</header>

    <main>
      <!-- 読み込み中表示 -->
      <div x-show="loading" x-transition.opacity class="loading-overlay">
        <div class="loading-box">
          <div class="spinner"></div>
          <p>読み込み中...</p>
        </div>
      </div>
      <div
        class="modal"
        x-show="editTarget"
        x-transition
        @click.self="editTarget=null"
      >
        <div class="modal-content">
          <h3>編集</h3>

          <input x-model="editTarget.name" placeholder="商品名" />
          <input type="date" x-model="editTarget.expireDate" />

          <div class="buttons">
            <button @click="saveEdit()">保存</button>
            <button @click="editTarget=null">キャンセル</button>
          </div>
        </div>
      </div>

      <!-- 入力フォーム -->
      <div class="card">
        <div x-data="foodForm()">
          <!-- 商品名 -->
          <label>商品名</label>
          <input type="text" placeholder="食品名" x-model="name" required />

          <!-- カテゴリ選択 -->
          <label>カテゴリ</label>
          <select x-model="category" @change="applyGrace()">
            <option value="">選択してください</option>
            <template x-for="(days, name) in categories" :key="name">
              <option :value="name" x-text="name"></option>
            </template>
          </select>

          <!-- 賞味・消費期限 -->
          <label>期限</label>
          <input type="date" x-model="expireDate" required />

          <!-- 猶予日数 -->
          <label>猶予日数（必要な場合のみ変更）</label>
          <input type="number" x-model.number="graceDays" />

          <!-- メモ -->
          <label>メモ</label>
          <input type="text" placeholder="メモ" x-model.number="memo" />

          <button @click="submit()">追加</button>
        </div>
      </div>

      <!-- フィルター -->
      <!-- <div class="card">
        <label> このあたりにフィルタボタンを配置 </label>
      </div> -->

      <!-- 一覧 -->
      <div class="list">
        <template x-for="item in sortedItems()" :key="item.id">
          <div
            class="item"
            :class="{ expired: isExpired(item) , rebuy: item.rebuy}"
          >
            <div class="item-header">
              <label class="rebuy-check">
                <input
                  type="checkbox"
                  :checked="item.rebuy"
                  @change="toggleRebuy(item)"
                />
                <span class="name" x-text="item.name"></span>
              </label>

              <div class="actions">
                <button class="icon-btn" @click="openEdit(item)">✏️</button>
                <button class="icon-btn delete" @click="deleteItem(item)">
                  🗑️
                </button>
              </div>
            </div>
            <div class="item-footer">
              <span>
                📅期限：<span x-text="formatDate(item.expireDate)"></span>
              </span>
              <span class="category" x-text="item.category"></span>
              <br />
              <span x-show="item.memo">
                💬メモ：<span
                  class="memo"
                  x-text="item.memo"
                  x-show="item.memo"
                ></span>
              </span>
            </div>
          </div>
        </template>
      </div>
    </main>

    <script>
      const API =
        'https://script.google.com/macros/s/AKfycbw8qNC_5N97lnovPQOG2GeoRRG4a4t6Rwl2INOb8Lu12IHq6g6d2nCIlCqI02aWfLeeLg/exec';
      const KEY = 'x8KpT2F7mH6z9NqJ5Cw4YB3Z0sE1LrOaDVXcIikUuStQyRdbGMnhPeWfAj';

      const GRACE_BY_CATEGORY = {
        肉・魚: 0,
        惣菜: 0,
        乳製品: 2,
        卵: 7,
        野菜・果物: 3,
        調味料: 180,
        缶詰: 365,
        乾物: 365,
        レトルト: 180,
        お菓子: 30,
        飲料: 7,
        その他: 0,
      };

      function app() {
        return {
          items: [],

          loading: false,

          // 編集対象のアイテム
          editTarget: null,

          async loadData() {
            this.loading = true;
            try {
              const data = await fetch(`${API}?key=${KEY}`).then((r) =>
                r.json(),
              );

              // 日付をYYYY-MM-DD形式にしてから保存
              this.items = data
                .map((item) => {
                  const d = new Date(item.expireDate);
                  return {
                    ...item,
                    expireDate: isNaN(d) ? '' : this.formatDate(d),
                    category: item.category,
                  };
                })
                .sort(
                  (a, b) => new Date(a.expireDate) - new Date(b.expireDate),
                );
            } catch (e) {
              alert('通信に失敗しました。もう一度操作をやり直してください。');
              console.error(e);
            } finally {
              this.loading = false;
            }
          },

          async addItem(payload) {
            // UUID生成
            const id = crypto.randomUUID();

            // UIへ反映
            const item = {
              id,
              name: payload.name,
              expireDate: payload.expireDate,
              category: payload.category,
              graceDays: payload.graceDays,
              rebuy: false,
              memo: payload.memo,
            };

            this.items.unshift(item);

            try {
              console.log(payload);
              console.log(item);
              const res = await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                body: JSON.stringify({
                  action: 'add',
                  ...item,
                }),
                // CORSエラー対策
                // NOTE: headersを指定しなくても、勝手にヘッダがついて引っかかる模様
                mode: 'no-cors',
              });
            } catch (e) {
              console.error(e);

              // 失敗時ロールバック
              this.items = this.items.filter((i) => i.id !== id);
              alert('保存に失敗しました');
            }
          },

          // 賞味期限切れかどうか
          isExpired(item) {
            return new Date(item.expireDate) < new Date();
          },

          // YYYY/MM/DD形式に変換する
          formatDate(date) {
            return new Date(date).toLocaleDateString('ja-JP', {
              timeZone: 'Asia/Tokyo',
            });
          },

          // 再購入フラグが入っているものを上にソート
          sortedItems() {
            return [...this.items].sort((a, b) => {
              if (a.rebuy !== b.rebuy) return b.rebuy - a.rebuy;
              return new Date(a.expireDate) - new Date(b.expireDate);
            });
          },

          // 再購入のトグル処理
          async toggleRebuy(item) {
            item.rebuy = !item.rebuy;

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'update',
                  ...item,
                }),
              });
            } catch (err) {
              item.rebuy = !item.rebuy;
              alert('更新に失敗しました');
            }
          },

          // 編集画面を開く
          async openEdit(item) {
            console.log(item);
            console.log(item.name);
            this.editTarget = JSON.parse(JSON.stringify(item));
          },

          // アイテムの削除
          async deleteItem(item) {
            if (!confirm(`「${item.name}」を削除しますか？`)) return;

            const backup = [...this.items];

            this.items = this.items.filter((i) => i.id != item.id);

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'delete',
                  id: item.id,
                }),
              });
            } catch (e) {
              console.log(e);

              // エラー時のロールバック処理
              this.items = backup;
              alert('削除に失敗しました。');
            }
          },

          async saveEdit(edited) {
            // バックアップ（ディープコピー）
            const backup = JSON.parse(JSON.stringify(this.items));

            const idx = this.items.findIndex((i) => i.id === edited.id);
            if (idx !== -1) {
              this.items[idx] = { ...edited };
            }

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'update',
                  ...edited,
                }),
              });
            } catch (e) {
              console.error(e);

              // ロールバック処理
              this.items = backup;
              alert('更新に失敗しました');
            }
          },
        };
      }

      function foodForm() {
        return {
          name: '',
          expireDate: '',
          category: '',
          graceDays: 0,
          rebuy: false,
          memo: '',

          categories: GRACE_BY_CATEGORY,

          applyGrace() {
            if (this.category) {
              this.graceDays = this.categories[this.category];
            }
          },

          validate() {
            if (!this.name.trim()) return '商品名を入力してください';
            if (!this.expireDate) return '賞味期限を入力してください';
            return null;
          },

          async submit() {
            const err = this.validate();
            if (err) {
              alert(err);
              return;
            }

            const payload = {
              name: this.name.trim(),
              expireDate: this.expireDate,
              category: this.category,
              graceDays: this.graceDays,
              rebuy: this.rebuy,
              memo: this.memo,
            };

            this.$dispatch('submit-data', payload);

            this.reset();
          },

          reset() {
            this.name = '';
            this.expireDate = '';
            this.category = '';
            this.graceDays = '';
            this.rebuy = false;
            this.memo = '';
          },
        };
      }
    </script>
  </body>
</html>
