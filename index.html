<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>賞味期限管理</title>

    <!-- Alpine.js -->
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    x-data="app()"
    x-init="loadData()"
    @submit-data.window="addItem($event.detail)"
    @update-data.window="saveEdit($event.detail)"
    @clear-edit.window="editingId = null"
  >
    <header>賞味期限管理</header>

    <main>
      <div class="list">
        <template x-for="item in sortedItems()" :key="item.id">
          <div
            class="item"
            :class="{ warn: getDaysUntilExpiry(item) <= 30, critical: getDaysUntilExpiry(item) <= 7, expired: isExpired(item), 'editing-now': editingId === item.id }"
            :style="{ '--hp-width': getHPWidth(item) }"
          >
            <div class="item-header">
              <label class="rebuy-check" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input
                  type="checkbox"
                  :checked="item.rebuy"
                  @change="toggleRebuy(item)"
                  @click.stop /* 親のクリックイベント（もしあれば）を阻害しない */
                />
                <span class="name" x-text="item.name"></span>
              </label>

              <div class="actions">
                <button class="icon-btn" @click="startEdit(item)">✏️</button>
                <button class="icon-btn" @click="deleteItem(item)">🗑️</button>
              </div>
            </div>
            <div class="item-footer">
              📅 <span x-text="DateUtils.forDisplay(item.expireDate)"></span> 📂
              <span x-text="item.category"></span>
              <template x-if="item.memo">
                <span> 💬 <span x-text="item.memo"></span></span>
              </template>
            </div>
          </div>
        </template>
      </div>
    </main>

    <div class="footer-form" x-data="foodForm()">
      <template x-if="editingId">
        <span class="edit-label">現在編集モード...</span>
      </template>

      <div class="form-grid">
        <input type="text" placeholder="食品名" x-model="name" />
        <select x-model="category" @change="applyGrace()">
          <option value="">カテゴリ</option>
          <template x-for="(days, catName) in categories" :key="catName">
            <option :value="catName" x-text="catName"></option>
          </template>
        </select>
        <input type="date" x-model="expireDate" />
        <input
          type="text"
          placeholder="メモを入力..."
          x-model="memo"
          style="font-size: 0.8rem"
        />
        <div style="display: flex; gap: 4px">
          <button
            class="btn-submit"
            @click="submit()"
            x-text="editingId ? '更新' : '追加'"
          ></button>
          <button
            class="btn-cancel"
            @click="cancelEdit()"
            x-text="editingId ? 'キャンセル' : '入力をリセット'"
          ></button>
        </div>
      </div>
    </div>

    <script>
      const API =
        'https://script.google.com/macros/s/AKfycbw8qNC_5N97lnovPQOG2GeoRRG4a4t6Rwl2INOb8Lu12IHq6g6d2nCIlCqI02aWfLeeLg/exec';
      const KEY = 'x8KpT2F7mH6z9NqJ5Cw4YB3Z0sE1LrOaDVXcIikUuStQyRdbGMnhPeWfAj';

      const GRACE_BY_CATEGORY = {
        肉・魚: 0,
        惣菜: 0,
        乳製品: 2,
        卵: 7,
        野菜・果物: 3,
        調味料: 180,
        缶詰: 365,
        乾物: 365,
        レトルト: 180,
        お菓子: 30,
        飲料: 7,
        その他: 0,
      };

      // 日付関連のユーティリティ
      const DateUtils = {
      // 表示用 (YYYY/MM/DD)
        forDisplay(date) {
          if (!date) return '';
          return new Date(date).toLocaleDateString('ja-JP', { timeZone: 'Asia/Tokyo' });
        },
        // 入力フォーム用 (YYYY-MM-DD)
        forInput(date) {
          if (!date) return '';
          const d = new Date(date);
          // ISO 8601形式 (YYYY-MM-DDTHH:mm:ss.sssZ) の先頭10文字を抜く
          return d.toISOString().split('T')[0];
        }
      }

      function app() {
        return {
          items: [],
          // 編集対象のアイテムID
          editingId: null,

          async loadData() {
            try {
              const data = await fetch(`${API}?key=${KEY}`).then((r) =>
                r.json(),
              );

              // 日付をYYYY-MM-DD形式にしてから保存
              this.items = data
                .map((item) => {
                  const d = new Date(item.expireDate);
                  return {
                    ...item,
                    expireDate: isNaN(d) ? '' : DateUtils.forDisplay(d),
                    category: item.category,
                  };
                })
                .sort(
                  (a, b) => new Date(a.expireDate) - new Date(b.expireDate),
                );
            } catch (e) {
              alert('通信に失敗しました。もう一度操作をやり直してください。');
              console.error(e);
            }
          },

          // 編集を開始する
          startEdit(item) {
            this.editingId = item.id;
            // フォームコンポーネントにデータを飛ばす
            window.dispatchEvent(new CustomEvent('set-form', { detail: item }));
          },

          // 編集内容を保存する
          async saveEdit(edited) {
            // バックアップ（ディープコピー）
            const backup = JSON.parse(JSON.stringify(this.items));

            const idx = this.items.findIndex((i) => i.id === edited.id);
            if (idx !== -1) {
              this.items[idx] = { ...edited };
            }
            this.editingId = null;

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'update',
                  ...edited,
                }),
              });
            } catch (e) {
              console.error(e);

              // ロールバック処理
              this.items = backup;
              alert('更新に失敗しました');
            }
          },

          // 新規項目を追加する
          async addItem(payload) {
            const newItem = { id: crypto.randomUUID(), ...payload, rebuy: false };
            this.items.unshift(newItem);

            try {
              console.log(payload);
              console.log(newItem);
              const res = await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                body: JSON.stringify({
                  action: 'add',
                  ...newItem,
                }),
                // CORSエラー対策
                // NOTE: headersを指定しなくても、勝手にヘッダがついて引っかかる模様
                mode: 'no-cors',
              });
            } catch (e) {
              console.error(e);

              // 失敗時ロールバック
              this.items = this.items.filter((i) => i.id !== id);
              alert('保存に失敗しました');
            }
          },

          // 賞味期限切れまでの残り日数を返す
          getDaysUntilExpiry(item) {
            const diffTime = new Date(item.expireDate) - new Date();
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          },

          // 賞味期限切れかどうか
          isExpired(item) {
            return new Date(item.expireDate) < new Date();
          },

          getHPWidth(item) {
            console.log(item);
            const days = this.getDaysUntilExpiry(item);
            const maxDays = 30; // 1ヶ月を最大とする
            const percentage = Math.max(0, Math.min(100, (days / maxDays) * 100));
            return `${percentage}%`;
          },

          // 再購入フラグが入っているものを上にソート
          sortedItems() {
            return [...this.items].sort((a, b) => {
              if (a.rebuy !== b.rebuy) return b.rebuy - a.rebuy;
              return new Date(a.expireDate) - new Date(b.expireDate);
            });
          },

          // 再購入のトグル処理
          async toggleRebuy(item) {
            item.rebuy = !item.rebuy;

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'update',
                  ...item,
                }),
              });
            } catch (err) {
              item.rebuy = !item.rebuy;
              alert('更新に失敗しました');
            }
          },

          // アイテムの削除
          async deleteItem(item) {
            if (!confirm(`「${item.name}」を削除しますか？`)) return;

            const backup = [...this.items];

            this.items = this.items.filter((i) => i.id != item.id);

            try {
              await fetch(`${API}?key=${KEY}`, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                  action: 'delete',
                  id: item.id,
                }),
              });
            } catch (e) {
              console.log(e);

              // エラー時のロールバック処理
              this.items = backup;
              alert('削除に失敗しました。');
            }
          },


        };
      }

      function foodForm() {
        return {
          // 編集対象のID、nullの場合新規
          editingId: null,

          name: '',
          expireDate: '',
          category: '',
          graceDays: 0,
          rebuy: false,
          memo: '',
          categories: GRACE_BY_CATEGORY,

          init() {
            // 外部(app)からの編集要求を受け取る
            window.addEventListener('set-form', (e) => {
              const item = e.detail;
              console.log(item.expireDate);
              this.editingId = item.id;
              this.name = item.name;
              this.category = item.category;
              this.expireDate = DateUtils.forInput(item.expireDate);
              this.memo = item.memo || '';
              this.rebuy = item.rebuy || false;
            });
          },

          applyGrace() {
            if (this.category) {
              this.graceDays = this.categories[this.category];
            }
          },

          validate() {
            if (!this.name.trim()) return '商品名を入力してください';
            if (!this.expireDate) return '賞味期限を入力してください';
            return null;
          },


          async submit() {
            const err = this.validate();
            if (err) {
              alert(err);
              return;
            }

            const payload = {
              name: this.name.trim(),
              expireDate: this.expireDate,
              category: this.category,
              graceDays: this.graceDays,
              rebuy: this.rebuy,
              memo: this.memo,
            };
            
            if(this.editingId) {
              // 編集対象が存在する場合は更新
              this.$dispatch('update-data', { id: this.editingId, ...payload });
            } else {
              this.$dispatch('submit-data', payload);
            }

            this.cancelEdit();
          },

          cancelEdit() {
            this.editingId = null;
            this.name = '';
            this.expireDate = '';
            this.category = '';
            this.graceDays = '';
            this.rebuy = false;
            this.memo = '';

            this.$dispatch('clear-edit');
          },
        };
      }
    </script>
  </body>
</html>
